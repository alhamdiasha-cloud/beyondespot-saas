<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beyondespot AI</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">

        <div class="logo">
            <h2>🚀 Beyondespot AI</h2>
            <p>Marketing Factory</p>
        </div>

        <div id="sidebar">
            <!-- Dibuat otomatis oleh app.js -->
        </div>

    </aside>

    <main class="main">

        <div class="header">

            <h1 id="toolTitle">
                Selamat Datang
            </h1>

            <p id="toolCategory">
                Pilih salah satu tool di sebelah kiri.
            </p>

        </div>

        <div class="card">

            <div id="toolForm">

                <p>
                    Silakan pilih tool untuk memulai.
                </p>

            </div>

        </div>

        <div class="card">

            <div id="result">

                <p>
                    Output akan muncul di sini.
                </p>

            </div>

        </div>

    </main>

</div>

<script src="js/app.js"></script>

</body>
</html>
